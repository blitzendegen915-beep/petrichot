name: Auto Article

on:
  schedule:
    - cron: "0 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check for API key
        id: check-key
        run: |
          if [ -z "${{ secrets.ANTHROPIC_API_KEY }}" ]; then
            echo "ANTHROPIC_API_KEY is not set — skipping article generation."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate article
        if: steps.check-key.outputs.skip == 'false'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node affiliate/generate-article.mjs

      - name: Commit and push new article
        if: steps.check-key.outputs.skip == 'false'
        run: |
          git config user.name "affiliate-bot"
          git config user.email "bot@users.noreply.github.com"
          git add affiliate/content
          if git diff --cached --quiet; then
            echo "No new article to commit."
          else
            git commit -m "auto: 新規記事を自動生成"
            git push origin HEAD:main
          fi
